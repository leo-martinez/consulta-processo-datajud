<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Consulta Processual · DataJud CNJ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f5f4; --surface: #ffffff; --border: rgba(0,0,0,0.1); --border-strong: rgba(0,0,0,0.18);
      --text: #1c1c1a; --text-muted: #6b6b68; --text-hint: #9a9a96;
      --accent: #3b5bdb; --accent-bg: #eef1ff; --accent-text: #2f4ac7;
      --success-bg: #ebfbee; --success-text: #2b8a3e;
      --warning-bg: #fff9db; --warning-text: #876800;
      --danger-bg: #fff5f5; --danger-text: #c92a2a;
      --radius: 10px; --radius-lg: 14px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1a18; --surface: #242422; --border: rgba(255,255,255,0.1); --border-strong: rgba(255,255,255,0.18);
        --text: #f0efeb; --text-muted: #a0a09c; --text-hint: #6b6b68;
        --accent: #748ffc; --accent-bg: #1e2448; --accent-text: #91a7ff;
        --success-bg: #0f2e17; --success-text: #69db7c;
        --warning-bg: #2e2200; --warning-text: #ffd43b;
        --danger-bg: #2e0f0f; --danger-text: #ff8787;
      }
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 2rem 1rem; }
    .container { max-width: 760px; margin: 0 auto; }
    .header { display: flex; align-items: center; gap: 12px; margin-bottom: 2rem; }
    .header-icon { width: 44px; height: 44px; background: var(--accent-bg); border-radius: var(--radius); display: flex; align-items: center; justify-content: center; font-size: 22px; color: var(--accent-text); flex-shrink: 0; }
    .header h1 { font-size: 20px; font-weight: 600; }
    .header p { font-size: 13px; color: var(--text-muted); margin-top: 2px; }
    .card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem; margin-bottom: 1rem; }
    label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 5px; font-weight: 500; }
    input, select { width: 100%; padding: 9px 12px; border: 0.5px solid var(--border-strong); border-radius: var(--radius); background: var(--bg); color: var(--text); font-family: inherit; font-size: 14px; outline: none; transition: border-color 0.15s; }
    input:focus, select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59,91,219,0.12); }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
    @media (max-width: 560px) { .grid-2, .grid-3 { grid-template-columns: 1fr; } }
    .search-type-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1rem; }
    .tab-btn { padding: 6px 14px; border: 0.5px solid var(--border-strong); border-radius: 20px; background: transparent; color: var(--text-muted); font-family: inherit; font-size: 13px; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
    .tab-btn:hover { background: var(--bg); color: var(--text); }
    .tab-btn.active { background: var(--accent-bg); color: var(--accent-text); border-color: var(--accent); font-weight: 500; }
    .search-panel { display: none; }
    .search-panel.active { display: block; }
    button.primary { width: 100%; padding: 10px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius); font-family: inherit; font-size: 14px; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 12px; transition: opacity 0.15s, transform 0.1s; }
    button.primary:hover { opacity: 0.88; }
    button.primary:active { transform: scale(0.98); }
    button.primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .status { display: none; margin-top: 1rem; padding: 10px 14px; border-radius: var(--radius); font-size: 13px; }
    .status.loading { background: var(--bg); color: var(--text-muted); border: 0.5px solid var(--border); }
    .status.error { background: var(--danger-bg); color: var(--danger-text); border: 0.5px solid var(--danger-text); }
    .result { display: none; margin-top: 1.5rem; }
    .result-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; flex-wrap: wrap; gap: 8px; }
    .result-count { font-size: 13px; color: var(--text-muted); }
    .meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1rem; }
    @media (max-width: 500px) { .meta-grid { grid-template-columns: 1fr; } }
    .meta-item { background: var(--bg); border-radius: var(--radius); padding: 10px 12px; }
    .meta-label { font-size: 11px; color: var(--text-muted); font-weight: 500; margin-bottom: 3px; }
    .meta-value { font-size: 13px; font-weight: 500; color: var(--text); }
    .badge { display: inline-flex; align-items: center; padding: 2px 9px; border-radius: 6px; font-size: 11px; font-weight: 500; white-space: nowrap; }
    .badge-blue { background: var(--accent-bg); color: var(--accent-text); }
    .badge-green { background: var(--success-bg); color: var(--success-text); }
    .badge-amber { background: var(--warning-bg); color: var(--warning-text); }
    .badge-gray { background: var(--bg); color: var(--text-muted); border: 0.5px solid var(--border-strong); }
    .section-title { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
    .section-title .count { font-size: 12px; color: var(--text-muted); font-weight: 400; }
    .parte-row { padding: 10px 0; border-bottom: 0.5px solid var(--border); }
    .parte-row:last-child { border-bottom: none; }
    .parte-header { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 3px; }
    .parte-name { font-size: 14px; font-weight: 500; }
    .parte-tipo { font-size: 12px; color: var(--text-muted); }
    .adv-row { font-size: 12px; color: var(--text-muted); margin-top: 4px; padding-left: 8px; display: flex; align-items: center; gap: 6px; }
    .mov-row { display: grid; grid-template-columns: 130px 1fr; gap: 8px; padding: 8px 0; border-bottom: 0.5px solid var(--border); align-items: start; }
    .mov-row:last-child { border-bottom: none; }
    .mov-row.latest { background: var(--accent-bg); border-radius: var(--radius); padding: 8px 10px; margin-bottom: 4px; }
    .mov-data { font-size: 12px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; padding-top: 1px; }
    .mov-nome { font-size: 13px; color: var(--text); }
    .mov-comp { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .numero-processo { font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 500; }
    .process-header { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 1rem; padding-bottom: 1rem; border-bottom: 0.5px solid var(--border); }
    .processo-card { margin-bottom: 1.5rem; }
    .pagination { display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 1rem; }
    .page-btn { padding: 6px 14px; border: 0.5px solid var(--border-strong); border-radius: var(--radius); background: transparent; color: var(--text); font-family: inherit; font-size: 13px; cursor: pointer; }
    .page-btn:hover { background: var(--bg); }
    .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .page-info { font-size: 13px; color: var(--text-muted); }
    footer { text-align: center; margin-top: 2rem; font-size: 12px; color: var(--text-hint); }
    footer a { color: var(--text-muted); text-decoration: none; }
    footer a:hover { text-decoration: underline; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinning { display: inline-block; animation: spin 1s linear infinite; }
    .divider { height: 0.5px; background: var(--border); margin: 1rem 0; }
  </style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="header-icon"><i class="ti ti-scale" aria-hidden="true"></i></div>
    <div>
      <h1>Consulta processual</h1>
      <p>API pública DataJud · CNJ · 91 tribunais</p>
    </div>
  </div>

  <div class="card">
    <div class="search-type-tabs">
      <button class="tab-btn active" onclick="setTab('numero')"><i class="ti ti-hash" aria-hidden="true"></i> Número</button>
      <button class="tab-btn" onclick="setTab('parte')"><i class="ti ti-user" aria-hidden="true"></i> Nome da parte</button>
      <button class="tab-btn" onclick="setTab('advogado')"><i class="ti ti-briefcase" aria-hidden="true"></i> Advogado</button>
      <button class="tab-btn" onclick="setTab('oab')"><i class="ti ti-id-badge" aria-hidden="true"></i> OAB</button>
      <button class="tab-btn" onclick="setTab('orgao')"><i class="ti ti-building" aria-hidden="true"></i> Órgão julgador</button>
      <button class="tab-btn" onclick="setTab('periodo')"><i class="ti ti-calendar" aria-hidden="true"></i> Período</button>
    </div>

    <div class="search-panel active" id="panel-numero">
      <div class="grid-2">
        <div>
          <label>Número do processo (CNJ)</label>
          <input type="text" id="input-numero" placeholder="0000000-00.0000.0.00.0000" style="font-family:'JetBrains Mono',monospace;" />
        </div>
        <div>
          <label>Tribunal</label>
          <select id="tribunal-numero">TRIBUNAIS_OPTIONS</select>
        </div>
      </div>
    </div>

    <div class="search-panel" id="panel-parte">
      <div class="grid-2">
        <div>
          <label>Nome da parte (autor, réu, empresa)</label>
          <input type="text" id="input-parte" placeholder="Ex: João Silva ou Empresa Ltda" />
        </div>
        <div>
          <label>Tribunal</label>
          <select id="tribunal-parte">TRIBUNAIS_OPTIONS</select>
        </div>
      </div>
    </div>

    <div class="search-panel" id="panel-advogado">
      <div class="grid-2">
        <div>
          <label>Nome do advogado</label>
          <input type="text" id="input-advogado" placeholder="Ex: Maria Oliveira" />
        </div>
        <div>
          <label>Tribunal</label>
          <select id="tribunal-advogado">TRIBUNAIS_OPTIONS</select>
        </div>
      </div>
    </div>

    <div class="search-panel" id="panel-oab">
      <div class="grid-3">
        <div>
          <label>Número OAB</label>
          <input type="text" id="input-oab-num" placeholder="Ex: 123456" />
        </div>
        <div>
          <label>UF da OAB</label>
          <select id="input-oab-uf">
            <option value="">Selecione</option>
            <option>AC</option><option>AL</option><option>AM</option><option>AP</option>
            <option>BA</option><option>CE</option><option>DF</option><option>ES</option>
            <option>GO</option><option>MA</option><option>MG</option><option>MS</option>
            <option>MT</option><option>PA</option><option>PB</option><option>PE</option>
            <option>PI</option><option>PR</option><option>RJ</option><option>RN</option>
            <option>RO</option><option>RR</option><option>RS</option><option>SC</option>
            <option>SE</option><option>SP</option><option>TO</option>
          </select>
        </div>
        <div>
          <label>Tribunal</label>
          <select id="tribunal-oab">TRIBUNAIS_OPTIONS</select>
        </div>
      </div>
    </div>

    <div class="search-panel" id="panel-orgao">
      <div class="grid-2">
        <div>
          <label>Órgão julgador / vara</label>
          <input type="text" id="input-orgao" placeholder="Ex: 2ª Vara Cível de Itaboraí" />
        </div>
        <div>
          <label>Tribunal</label>
          <select id="tribunal-orgao">TRIBUNAIS_OPTIONS</select>
        </div>
      </div>
    </div>

    <div class="search-panel" id="panel-periodo">
      <div class="grid-3">
        <div>
          <label>Data inicial (ajuizamento)</label>
          <input type="date" id="input-data-ini" />
        </div>
        <div>
          <label>Data final</label>
          <input type="date" id="input-data-fim" />
        </div>
        <div>
          <label>Tribunal</label>
          <select id="tribunal-periodo">TRIBUNAIS_OPTIONS</select>
        </div>
      </div>
    </div>

    <button class="primary" id="btnConsultar" onclick="consultar()">
      <i class="ti ti-search" aria-hidden="true"></i> Consultar
    </button>
    <div class="status" id="status"></div>
  </div>

  <div class="result" id="resultado"></div>

  <footer>
    Dados fornecidos pela <a href="https://datajud-wiki.cnj.jus.br/api-publica/" target="_blank">API pública do DataJud · CNJ</a>
  </footer>
</div>

<script>
const PROXY_URL = "https://consulta-processo-datajud.vercel.app/api/proxy";

const TRIBUNAIS = [
  ["tjrj","TJRJ"],["tjsp","TJSP"],["tjmg","TJMG"],["tjrs","TJRS"],["tjpr","TJPR"],
  ["tjba","TJBA"],["tjsc","TJSC"],["tjpe","TJPE"],["tjgo","TJGO"],["tjam","TJAM"],
  ["tjdf","TJDF"],["tjes","TJES"],["tjmt","TJMT"],["tjms","TJMS"],["tjpa","TJPA"],
  ["tjpb","TJPB"],["tjpi","TJPI"],["tjrn","TJRN"],["tjro","TJRO"],["tjrr","TJRR"],
  ["tjse","TJSE"],["tjto","TJTO"],["tjal","TJAL"],["tjac","TJAC"],["tjap","TJAP"],
  ["tjma","TJMA"],["trf1","TRF1"],["trf2","TRF2"],["trf3","TRF3"],["trf4","TRF4"],
  ["trf5","TRF5"],["trf6","TRF6"],["tst","TST"],["stj","STJ"],["stf","STF"],
  ["trt1","TRT1"],["trt2","TRT2"],["trt3","TRT3"],["trt4","TRT4"],["trt5","TRT5"],
  ["trt6","TRT6"],["trt7","TRT7"],["trt8","TRT8"],["trt9","TRT9"],["trt10","TRT10"],
  ["trt11","TRT11"],["trt12","TRT12"],["trt13","TRT13"],["trt14","TRT14"],["trt15","TRT15"],
  ["trt16","TRT16"],["trt17","TRT17"],["trt18","TRT18"],["trt19","TRT19"],["trt20","TRT20"],
  ["trt21","TRT21"],["trt22","TRT22"],["trt23","TRT23"],["trt24","TRT24"],
];

const OPTIONS_HTML = TRIBUNAIS.map(([v,l]) => `<option value="${v}">${l}</option>`).join('');
document.querySelectorAll('select[id^="tribunal-"]').forEach(s => s.innerHTML = OPTIONS_HTML);

let currentTab = 'numero';
let currentPage = 0;
let lastQuery = null;
let lastTribunal = null;
const PAGE_SIZE = 10;

function setTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.remove('active'));
  event.target.closest('.tab-btn').classList.add('active');
  document.querySelectorAll('.search-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + tab).classList.add('active');
  document.getElementById('resultado').style.display = 'none';
  document.getElementById('status').style.display = 'none';
}

function setStatus(msg, type) {
  const el = document.getElementById('status');
  el.className = 'status ' + (type || '');
  el.style.display = msg ? 'block' : 'none';
  el.innerHTML = msg;
}

function fmtData(s) {
  if (!s) return '—';
  try {
    const d = new Date(s);
    return d.toLocaleDateString('pt-BR') + ' ' + d.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
  } catch(e) { return s; }
}

function badge(txt, cls) {
  return `<span class="badge badge-${cls}">${txt}</span>`;
}

function buildQuery() {
  switch(currentTab) {
    case 'numero':
      const num = document.getElementById('input-numero').value.trim();
      if (!num) return null;
      return { query: { match: { numeroProcesso: num } }, tribunal: document.getElementById('tribunal-numero').value };

    case 'parte':
      const parte = document.getElementById('input-parte').value.trim();
      if (!parte) return null;
      return { query: { match: { "partes.nome": parte } }, tribunal: document.getElementById('tribunal-parte').value, sort: [{ dataAjuizamento: { order: 'desc' } }] };

    case 'advogado':
      const adv = document.getElementById('input-advogado').value.trim();
      if (!adv) return null;
      return { query: { match: { "partes.advogados.nome": adv } }, tribunal: document.getElementById('tribunal-advogado').value, sort: [{ dataAjuizamento: { order: 'desc' } }] };

    case 'oab':
      const oabNum = document.getElementById('input-oab-num').value.trim();
      const oabUf = document.getElementById('input-oab-uf').value.trim();
      if (!oabNum) return null;
      const oabQuery = oabUf
        ? { bool: { must: [{ match: { "partes.advogados.numeroOAB": oabNum } }, { match: { "partes.advogados.ufOAB": oabUf } }] } }
        : { match: { "partes.advogados.numeroOAB": oabNum } };
      return { query: oabQuery, tribunal: document.getElementById('tribunal-oab').value, sort: [{ dataAjuizamento: { order: 'desc' } }] };

    case 'orgao':
      const orgao = document.getElementById('input-orgao').value.trim();
      if (!orgao) return null;
      return { query: { match: { "orgaoJulgador.nome": orgao } }, tribunal: document.getElementById('tribunal-orgao').value, sort: [{ dataAjuizamento: { order: 'desc' } }] };

    case 'periodo':
      const ini = document.getElementById('input-data-ini').value;
      const fim = document.getElementById('input-data-fim').value;
      if (!ini && !fim) return null;
      const range = {};
      if (ini) range.gte = ini;
      if (fim) range.lte = fim + 'T23:59:59';
      return { query: { range: { dataAjuizamento: range } }, tribunal: document.getElementById('tribunal-periodo').value, sort: [{ dataAjuizamento: { order: 'desc' } }] };

    default: return null;
  }
}

async function consultar(page = 0) {
  const built = buildQuery();
  if (!built) { setStatus('Preencha pelo menos um campo de busca.', 'error'); return; }

  currentPage = page;
  lastQuery = built;

  const btn = document.getElementById('btnConsultar');
  const resultDiv = document.getElementById('resultado');

  btn.disabled = true;
  btn.innerHTML = '<i class="ti ti-loader spinning" aria-hidden="true"></i> Consultando...';
  resultDiv.style.display = 'none';
  setStatus('Buscando na API do DataJud...', 'loading');

  try {
    const res = await fetch(PROXY_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ...built, size: PAGE_SIZE, from: page * PAGE_SIZE })
    });

    if (!res.ok) throw new Error(`Erro ${res.status}: ${res.statusText}`);
    const data = await res.json();
    const hits = (data.hits || {}).hits || [];
    const total = ((data.hits || {}).total || {}).value || 0;

    if (!hits.length) {
      setStatus('Nenhum processo encontrado. Verifique os termos ou tente outro tribunal.', 'error');
    } else {
      setStatus('', '');
      resultDiv.style.display = 'block';
      const totalPages = Math.ceil(total / PAGE_SIZE);
      resultDiv.innerHTML = `
        <div class="result-header">
          <span class="result-count"><strong>${total.toLocaleString('pt-BR')}</strong> processo${total !== 1 ? 's' : ''} encontrado${total !== 1 ? 's' : ''}</span>
          ${total > PAGE_SIZE ? `<span class="result-count">Página ${page+1} de ${totalPages}</span>` : ''}
        </div>
        ${hits.map(h => renderProcesso(h._source || {})).join('')}
        ${total > PAGE_SIZE ? renderPagination(page, totalPages) : ''}
      `;
    }
  } catch(e) {
    setStatus('Erro ao consultar: ' + e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<i class="ti ti-search" aria-hidden="true"></i> Consultar';
  }
}

function renderPagination(page, totalPages) {
  return `<div class="pagination">
    <button class="page-btn" onclick="consultar(${page-1})" ${page===0?'disabled':''}>
      <i class="ti ti-chevron-left" aria-hidden="true"></i> Anterior
    </button>
    <span class="page-info">Página ${page+1} de ${totalPages}</span>
    <button class="page-btn" onclick="consultar(${page+1})" ${page>=totalPages-1?'disabled':''}>
      Próxima <i class="ti ti-chevron-right" aria-hidden="true"></i>
    </button>
  </div>`;
}

function renderProcesso(src) {
  const partes = src.partes || [];
  const movs = (src.movimentos || []).sort((a,b) => new Date(b.dataHora) - new Date(a.dataHora));
  const assuntos = (src.assuntos || []).map(a => a.nome).filter(Boolean).join(' · ') || '—';

  const partesHTML = partes.length ? partes.map(p => {
    const polo = (p.polo || '?').toLowerCase();
    const corPolo = polo === 'ativo' ? 'blue' : polo === 'passivo' ? 'amber' : 'gray';
    const advs = (p.advogados || []).map(a =>
      `<div class="adv-row"><i class="ti ti-briefcase" style="font-size:12px;" aria-hidden="true"></i> ${a.nome||'—'} · OAB ${a.numeroOAB||'?'}${a.ufOAB?' '+a.ufOAB:''}</div>`
    ).join('');
    return `<div class="parte-row">
      <div class="parte-header">
        ${badge(polo.toUpperCase(), corPolo)}
        <span class="parte-name">${p.nome||'—'}</span>
        <span class="parte-tipo">${(p.tipo||{}).nome||''}</span>
      </div>${advs}
    </div>`;
  }).join('') : '<p style="font-size:13px;color:var(--text-muted);padding:8px 0;">Sem partes disponíveis.</p>';

  const movsHTML = movs.length ? movs.slice(0,30).map((m,i) => {
    const comps = (m.complementosTabelados||[]).map(c=>c.descricao||c.nome).filter(Boolean).join(' · ');
    return `<div class="mov-row ${i===0?'latest':''}">
      <span class="mov-data">${fmtData(m.dataHora)}</span>
      <div>
        <div class="mov-nome">${m.nome||'—'}</div>
        ${comps?`<div class="mov-comp">${comps}</div>`:''}
      </div>
    </div>`;
  }).join('') + (movs.length>30?`<p style="font-size:12px;color:var(--text-muted);margin-top:8px;">...e mais ${movs.length-30} movimentações.</p>`:'')
  : '<p style="font-size:13px;color:var(--text-muted);">Sem movimentações.</p>';

  const valor = src.valor ? `R$ ${Number(src.valor).toLocaleString('pt-BR', {minimumFractionDigits:2})}` : '—';

  return `<div class="card processo-card">
    <div class="process-header">
      <i class="ti ti-file-description" style="font-size:18px;color:var(--text-muted);" aria-hidden="true"></i>
      <span class="numero-processo">${src.numeroProcesso||'—'}</span>
      ${src.grau ? badge(src.grau, 'gray') : ''}
      ${(src.formato||{}).nome ? badge(src.formato.nome, 'blue') : ''}
    </div>
    <div class="meta-grid">
      <div class="meta-item"><div class="meta-label">Classe</div><div class="meta-value">${(src.classe||{}).nome||'—'}</div></div>
      <div class="meta-item"><div class="meta-label">Tribunal</div><div class="meta-value">${src.tribunal||'—'}</div></div>
      <div class="meta-item"><div class="meta-label">Órgão julgador</div><div class="meta-value">${(src.orgaoJulgador||{}).nome||'—'}</div></div>
      <div class="meta-item"><div class="meta-label">Data de ajuizamento</div><div class="meta-value">${fmtData(src.dataAjuizamento)}</div></div>
      <div class="meta-item"><div class="meta-label">Valor da causa</div><div class="meta-value">${valor}</div></div>
      <div class="meta-item"><div class="meta-label">Última atualização</div><div class="meta-value">${fmtData(src.dataUltimaAtualizacao)}</div></div>
    </div>
    <div class="meta-item" style="margin-bottom:1rem;"><div class="meta-label">Assunto(s)</div><div class="meta-value" style="font-weight:400;">${assuntos}</div></div>
    <div class="divider"></div>
    <div class="section-title"><i class="ti ti-users" style="font-size:16px;" aria-hidden="true"></i> Partes</div>
    ${partesHTML}
    <div class="divider"></div>
    <div class="section-title">
      <i class="ti ti-clock" style="font-size:16px;" aria-hidden="true"></i>
      Movimentações <span class="count">(${movs.length} total)</span>
    </div>
    ${movsHTML}
  </div>`;
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter') consultar();
});
</script>
</body>
</html>
